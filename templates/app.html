<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大众金曲分析 | 探索页面</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">← 返回</button>
                <h1>🎵 大众金曲分析</h1>
            </div>
            <nav class="header-nav">
                <button class="nav-btn active" data-tab="periods">五年周期</button>
                <button class="nav-btn" data-tab="trends">流派趋势</button>
                <button class="nav-btn" data-tab="rankings">排行榜</button>
            </nav>
        </header>

        <!-- 五年周期 -->
        <section id="periods" class="tab-content active">
            <div class="section-title">📊 每五年最流行音乐类型</div>
            <div class="periods-grid" id="periodsGrid"></div>
        </section>

        <!-- 流派趋势 -->
        <section id="trends" class="tab-content">
            <div class="section-title">📈 流派流行度趋势（1995-2020）</div>
            <div id="trendsChart" class="chart-container"></div>
        </section>

        <!-- 排行榜 -->
        <section id="rankings" class="tab-content">
            <div class="section-title">🏆 选择年份查看前10排行</div>
            <div class="year-selector">
                <button class="year-btn" data-year="1995">1995</button>
                <button class="year-btn" data-year="2000">2000</button>
                <button class="year-btn" data-year="2005">2005</button>
                <button class="year-btn" data-year="2010">2010</button>
                <button class="year-btn" data-year="2015">2015</button>
                <button class="year-btn" data-year="2020">2020</button>
            </div>
            <div id="rankingsContainer" class="rankings-container"></div>
        </section>
    </div>

    <!-- 音乐播放器模态框 -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closePlayer()">✕</button>
            <div class="player">
                <div class="player-cover">
                    <div class="cover-art" id="coverArt"></div>
                </div>
                <div class="player-info">
                    <h2 id="playerSongTitle"></h2>
                    <p id="playerArtist"></p>
                    <p id="playerGenre" class="genre-badge"></p>
                </div>
                <div class="player-controls">
                    <button class="player-btn" onclick="playPrev()">⏮</button>
                    <button class="player-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
                    <button class="player-btn" onclick="playNext()">⏭</button>
                </div>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                    <input type="range" id="progressSlider" min="0" max="100" value="0" class="slider">
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span> / <span id="totalTime">3:00</span>
                </div>
                <div class="player-actions">
                    <button class="action-btn" onclick="addToPlaylist()">♡ 收藏</button>
                    <button class="action-btn" onclick="shareTrack()">📤 分享</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 音频元素 -->
    <audio id="audioPlayer"></audio>

    <script src="/static/js/app.js"></script>
</body>
</html>
